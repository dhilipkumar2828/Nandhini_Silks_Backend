<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nandhini Silks - Traditionally Elegant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Plus+Jakarta+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .landing-hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        .landing-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: brightness(0.6);
            animation: scaleBg 20s infinite alternate;
        }

        @keyframes scaleBg {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .landing-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            background: rgba(169, 27, 67, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            max-width: 600px;
            margin: 0 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .landing-logo {
            width: 250px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .landing-tagline {
            font-family: 'Great Vibes', cursive;
            color: #f3a349;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .landing-desc {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .landing-btn {
            display: inline-block;
            padding: 16px 40px;
            background: #A91B43;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 2px solid #A91B43;
            box-shadow: 0 10px 20px rgba(169, 27, 67, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .landing-btn:hover {
            background: transparent;
            color: #A91B43;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(169, 27, 67, 0.5);
        }

        @media (max-width: 768px) {
            .landing-tagline { font-size: 2rem; }
            .landing-logo { width: 180px; }
            .landing-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <section class="landing-hero">
        <img src="public/images/landing-hero.png" alt="Luxurious Silk Saree" class="landing-bg">
        <div class="landing-content">
            <img src="public/images/image 1.png" alt="Nandhini Silks Logo" class="landing-logo">
            <h1 class="landing-tagline">Traditionally Elegant</h1>
            <p class="landing-desc">Experience the finest craftsmanship of silk, handwoven with traditions for your special moments.</p>
            <a href="public/" class="landing-btn">Experience Demo Website</a>
        </div>
    </section>
</body>
</html>
